<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiotel Chatbot — agent_a Chatbot</title>
</head>
<body>

<h2>Kiotel Chatbot — agent_a AI Assistant</h2>

<div style="border:1px solid #ccc; padding:10px; margin-bottom:10px; background:#f5f5f5;">
  <div style="margin-bottom:8px;">
    <label for="apiKey"><b>API Key:</b></label>
    <input type="password" id="apiKey" placeholder="Bearer token (API_TOKEN)" style="width:300px;">
  </div>
  <div style="margin-bottom:8px;">
    <label for="userRole"><b>User role:</b></label>
    <select id="userRole">
      <option value="user">user (default, no special tool access)</option>
      <option value="agent">agent (property document Q&amp;A)</option>
      <option value="admin">admin (live data queries)</option>
      <option value="customer">customer (live data queries)</option>
    </select>
  </div>
  <div>
    <label for="deviceId"><b>Device ID:</b></label>
    <input type="text" id="deviceId" placeholder="e.g. device-001 (only needed for property document Q&A)" style="width:300px;">
  </div>
</div>

<hr>

<div id="messages" style="height:400px; overflow-y:auto; border:1px solid #ccc; padding:10px; margin-bottom:10px; background:#fafafa;">
  <p><b>agent_a:</b> Hello! I'm agent_a, your Kiotel Chatbot assistant. How can I help you?</p>
</div>

<div>
  <textarea id="input" rows="3" cols="60" placeholder="Type your message..."></textarea>
  <br>
  <button onclick="sendMessage()">Send</button>
  <button onclick="clearChat()">Clear</button>
</div>

<hr>
<p><small>Intent: <span id="intent">—</span> | Multi-query: <span id="multi">—</span> | Session: <span id="session">—</span></small></p>

<script>
var sessionId = null;

window.addEventListener('DOMContentLoaded', function() {
  var savedKey = localStorage.getItem('kiotel_chatbot_api_key');
  if (savedKey) document.getElementById('apiKey').value = savedKey;
  var savedRole = localStorage.getItem('kiotel_chatbot_user_role');
  if (savedRole) document.getElementById('userRole').value = savedRole;
  var savedDevice = localStorage.getItem('kiotel_chatbot_device_id');
  if (savedDevice) document.getElementById('deviceId').value = savedDevice;
});

document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function authHeaders() {
  var apiKey = document.getElementById('apiKey').value.trim();
  var headers = { 'Content-Type': 'application/json' };
  if (apiKey) {
    headers['Authorization'] = 'Bearer ' + apiKey;
    localStorage.setItem('kiotel_chatbot_api_key', apiKey);
  }
  return headers;
}

function currentMetadata() {
  var userRole = document.getElementById('userRole').value;
  var deviceId = document.getElementById('deviceId').value.trim();
  localStorage.setItem('kiotel_chatbot_user_role', userRole);
  localStorage.setItem('kiotel_chatbot_device_id', deviceId);

  var metadata = { user_role: userRole };
  if (deviceId) metadata.device_id = deviceId;
  return metadata;
}

function sendMessage() {
  var text = document.getElementById('input').value.trim();
  if (!text) return;

  appendMessage('You', text);
  document.getElementById('input').value = '';
  appendMessage('agent_a', '');

  var fullText = '';

  fetch('/chat', {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({ message: text, session_id: sessionId, metadata: currentMetadata() })
  })
  .then(function(response) {
    if (!response.ok) {
      return response.text().then(function(body) {
        throw new Error('HTTP ' + response.status + ': ' + body);
      });
    }

    var reader = response.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    function readChunk() {
      return reader.read().then(function(result) {
        if (result.done) return;

        buffer += decoder.decode(result.value, { stream: true });
        var parts = buffer.split('\n\n');
        buffer = parts.pop();

        parts.forEach(function(line) {
          if (!line.startsWith('data:')) return;
          var dataStr = line.slice(5).trim();
          if (dataStr === '[DONE]') return;

          try {
            var event = JSON.parse(dataStr);

            if (event.type === 'metadata') {
              sessionId = event.session_id || sessionId;
              document.getElementById('intent').textContent = event.intent || '—';
              document.getElementById('session').textContent = sessionId ? sessionId.slice(0, 8) : '—';
            } else if (event.type === 'chunk') {
              fullText += event.text;
              updateLastMessage('agent_a', fullText);
            } else if (event.type === 'blocked') {
              fullText = event.message;
              updateLastMessage('agent_a', fullText);
            }
          } catch (e) {
            console.error('Failed to parse SSE event:', dataStr, e);
          }
        });

        return readChunk();
      });
    }

    return readChunk();
  })
  .catch(function(err) {
    updateLastMessage('Error', err.message || 'Unknown error');
  });
}

function appendMessage(sender, text) {
  var box = document.getElementById('messages');
  var p = document.createElement('p');
  var safeText = (text || '').toString().replace(/\n/g, '<br>');
  p.innerHTML = '<b>' + sender + ':</b> ' + safeText;
  box.appendChild(p);
  box.scrollTop = box.scrollHeight;
}

function updateLastMessage(sender, text) {
  var box = document.getElementById('messages');
  var p = box.lastChild;
  var safeText = (text || '').toString().replace(/\n/g, '<br>');
  p.innerHTML = '<b>' + sender + ':</b> ' + safeText;
  box.scrollTop = box.scrollHeight;
}

function clearChat() {
  if (sessionId) {
    fetch('/session/' + sessionId, { method: 'DELETE', headers: authHeaders() });
  }
  sessionId = null;
  var box = document.getElementById('messages');
  box.innerHTML = '<p><b>agent_a:</b> Hello! I\'m agent_a, your Portal A assistant. How can I help you?</p>';
  document.getElementById('intent').textContent = '—';
  document.getElementById('multi').textContent = '—';
  document.getElementById('session').textContent = '—';
}
</script>

</body>
</html>
