services:

  # ── Free local receptionist model (chit-chat / off-topic guardrail) ───────
  ollama:
    image: ollama/ollama:latest
    container_name: chatbot-ollama
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:1.5b}
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh:ro
    # No published port — portal_a reaches this over the internal Docker
    # network at http://ollama:11434. Ollama has no built-in auth, so it must
    # never be exposed to the host/public network. For local debugging only,
    # temporarily add: "127.0.0.1:11434:11434" (bind to loopback, not 0.0.0.0).
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Single shared PostgreSQL (chatbot cache, RAG chunks, customer_module's
  #    Vanna vector store, and doc-chat-service's property_document_contents —
  #    each in its own table; the real Kiotel business DB customer_module
  #    queries is separate and external, see the `customer_module` service below) ─
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatbot-postgres
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Run Alembic migrations before any app starts ──────────────────────────
  migrate:
    build:
      context: .
    container_name: chatbot-migrate
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      PG_DSN: postgresql://chatbot:chatbot@postgres:5432/chatbot
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Kiotel Dashboard RAG API ──────────────────────────────────────────────
  kiotel_rag:
    build:
      context: ./services/kiotel_dashboard_step_guide
    container_name: kiotel-rag-api
    ports:
      - "8011:8000"
    env_file:
      - ./services/kiotel_dashboard_step_guide/.env
    environment:
      PG_DSN: postgresql://chatbot:chatbot@postgres:5432/chatbot
    volumes:
      - ./services/kiotel_dashboard_step_guide/data:/app/data
      - ./services/kiotel_dashboard_step_guide/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── customer_module API (QueryWeaver): natural language -> SQL -> Kiotel
  #    business DB ──────────────────────────────────────────────────────────
  # Its Vanna vector store (schema DDL/documentation/example SQL only — never
  # real business data) lives in the shared `postgres` service below, in its
  # own vanna_ddl/vanna_documentation/vanna_sql tables (auto-created on
  # connect by HybridPGVectorStore). The actual business DB it queries
  # (PGHOST/PGDATABASE/PGUSER/PGPASSWORD, read-only role) is a SEPARATE,
  # external database this repo does not bundle — never point that at
  # `postgres` above. No published host port — reached only internally by
  # portal_a, same as ollama.
  customer_module:
    build:
      context: ./services/customer_module
    container_name: customer-module-api
    command: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      # Real Kiotel business DB (read-only role), fully separate from the
      # `postgres` cache service below. This repo doesn't bundle that
      # database; point these at wherever it's actually hosted.
      PGHOST: ${CUSTOMER_MODULE_PGHOST}
      PGPORT: ${CUSTOMER_MODULE_PGPORT:-5432}
      PGDATABASE: ${CUSTOMER_MODULE_PGDATABASE}
      PGUSER: ${CUSTOMER_MODULE_PGUSER}
      PGPASSWORD: ${CUSTOMER_MODULE_PGPASSWORD}
      PG_STATEMENT_TIMEOUT_MS: ${CUSTOMER_MODULE_PG_STATEMENT_TIMEOUT_MS:-5000}
      DEFAULT_ROW_LIMIT: ${CUSTOMER_MODULE_DEFAULT_ROW_LIMIT:-5}
      # Vanna's own retrieval store — shared `postgres` service, different tables.
      VECTOR_DB_HOST: postgres
      VECTOR_DB_PORT: 5432
      VECTOR_DB_NAME: chatbot
      VECTOR_DB_USER: chatbot
      VECTOR_DB_PASSWORD: chatbot
      EMBEDDING_MODEL: ${CUSTOMER_MODULE_EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      RETRIEVAL_TOP_K: ${CUSTOMER_MODULE_RETRIEVAL_TOP_K:-6}
      API_KEY: ${CUSTOMER_MODULE_API_KEY:-}
      FASTEMBED_CACHE_PATH: /model_cache
    volumes:
      - customer_module_model_cache:/model_cache
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── customer_module: one-time Vanna training ────────────────────────────────
  # Embeds table DDL, documentation, and example question->SQL pairs (from
  # services/customer_module/schema/*.json) into the vanna_ddl/vanna_documentation
  # /vanna_sql tables in the shared `postgres` service. Run once, and again
  # after any real business-DB schema change:
  #   docker compose run --rm customer_module_train
  customer_module_train:
    build:
      context: ./services/customer_module
    container_name: customer-module-train
    command: ["python", "-m", "src.train_vanna"]
    env_file:
      - .env
    environment:
      PGHOST: ${CUSTOMER_MODULE_PGHOST}
      PGPORT: ${CUSTOMER_MODULE_PGPORT:-5432}
      PGDATABASE: ${CUSTOMER_MODULE_PGDATABASE}
      PGUSER: ${CUSTOMER_MODULE_PGUSER}
      PGPASSWORD: ${CUSTOMER_MODULE_PGPASSWORD}
      PG_STATEMENT_TIMEOUT_MS: ${CUSTOMER_MODULE_PG_STATEMENT_TIMEOUT_MS:-5000}
      VECTOR_DB_HOST: postgres
      VECTOR_DB_PORT: 5432
      VECTOR_DB_NAME: chatbot
      VECTOR_DB_USER: chatbot
      VECTOR_DB_PASSWORD: chatbot
      EMBEDDING_MODEL: ${CUSTOMER_MODULE_EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      RETRIEVAL_TOP_K: ${CUSTOMER_MODULE_RETRIEVAL_TOP_K:-6}
      FASTEMBED_CACHE_PATH: /model_cache
    volumes:
      - customer_module_model_cache:/model_cache
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    profiles:
      - train

  # ── doc-chat-service API: per-device property document Q&A ─────────────────
  # Reads property_document_contents from the REAL kiosk-dashboard business DB,
  # via the same read-only credentials as `customer_module` (CUSTOMER_MODULE_PG*)
  # — doc_chat only ever runs a fixed, parameterized SELECT inside a Postgres
  # READ ONLY transaction (see services/workflow/api/app/repository.py), so
  # reusing the read-only role here is safe. The local mirror table created by
  # alembic/versions/0002_add_property_document_contents.py in the shared
  # `postgres` service is no longer used by this service (left in place,
  # harmless). No published host port — it has no real auth (user_role is
  # self-declared), reached only internally by portal_a.
  doc_chat:
    build:
      context: ./services/workflow
    container_name: doc-chat-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${CUSTOMER_MODULE_PGUSER}:${CUSTOMER_MODULE_PGPASSWORD}@${CUSTOMER_MODULE_PGHOST}:${CUSTOMER_MODULE_PGPORT:-5432}/${CUSTOMER_MODULE_PGDATABASE}
      REQUIRED_USER_ROLE: ${DOC_CHAT_REQUIRED_USER_ROLE:-agent}
      CORS_ALLOW_ORIGINS: ${DOC_CHAT_CORS_ALLOW_ORIGINS:-*}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Portal A Chatbot ──────────────────────────────────────────────────────
  portal_a:
    build:
      context: .
    container_name: portal-a
    ports:
      - "8010:8000"
    env_file:
      - .env
    environment:
      PG_DSN: postgresql://chatbot:chatbot@postgres:5432/chatbot
      KIOTEL_RAG_URL: http://kiotel_rag:8000
      OLLAMA_HOST: http://ollama:11434
      CUSTOMER_MODULE_URL: http://customer_module:8000
      CUSTOMER_MODULE_API_KEY: ${CUSTOMER_MODULE_API_KEY:-}
      DOC_CHAT_URL: http://doc_chat:8000
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      kiotel_rag:
        condition: service_healthy
      ollama:
        condition: service_started
      customer_module:
        condition: service_healthy
      doc_chat:
        condition: service_healthy
    restart: unless-stopped

  # ── RAG ingest ────────────────────────────────────────────────────────────
  ingest:
    build:
      context: ./services/kiotel_dashboard_step_guide
    container_name: kiotel-ingest
    command: python scripts/ingest.py
    env_file:
      - ./services/kiotel_dashboard_step_guide/.env
    environment:
      PG_DSN: postgresql://chatbot:chatbot@postgres:5432/chatbot
    volumes:
      - ./services/kiotel_dashboard_step_guide/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    profiles:
      - ingest

  # ── RAG evaluate ──────────────────────────────────────────────────────────
  evaluate:
    build:
      context: ./services/kiotel_dashboard_step_guide
    container_name: kiotel-evaluate
    command: python scripts/evaluate.py
    env_file:
      - ./services/kiotel_dashboard_step_guide/.env
    environment:
      PG_DSN: postgresql://chatbot:chatbot@postgres:5432/chatbot
    volumes:
      - ./services/kiotel_dashboard_step_guide/data:/app/data
      - ./services/kiotel_dashboard_step_guide/evaluation_results:/app/evaluation_results
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    profiles:
      - evaluate

volumes:
  pgdata:
  ollama_data:
  customer_module_model_cache:
