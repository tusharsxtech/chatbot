<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal A — agent_a Chatbot</title>
</head>
<body>

<h2>Portal A — agent_a AI Assistant</h2>
<hr>

<div id="messages" style="height:400px; overflow-y:auto; border:1px solid #ccc; padding:10px; margin-bottom:10px; background:#fafafa;">
  <p><b>agent_a:</b> Hello! I'm agent_a, your Portal A assistant. How can I help you?</p>
</div>

<div>
  <textarea id="input" rows="3" cols="60" placeholder="Type your message..."></textarea>
  <br>
  <button onclick="sendMessage()">Send</button>
  <button onclick="clearChat()">Clear</button>
</div>

<hr>
<p><small>Intent: <span id="intent">—</span> | Multi-query: <span id="multi">—</span> | Session: <span id="session">—</span></small></p>

<script>
var sessionId = null;

document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function sendMessage() {
  var text = document.getElementById('input').value.trim();
  if (!text) return;

  appendMessage('You', text);
  document.getElementById('input').value = '';
  appendMessage('agent_a', '...');

  fetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text, session_id: sessionId })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    removeLastMessage();

    var response = data.response || 'Sorry, I could not process that request.';
    appendMessage('agent_a', response);

    if (data.escalation && data.escalation.triggered) {
      appendMessage('System', 'Escalation ticket raised: ' + data.escalation.ticket_id);
    }

    if (data.sub_responses && data.sub_responses.length > 0) {
      data.sub_responses.forEach(function(sub) {
        appendMessage('agent_a', sub);
      });
    }

    sessionId = data.session_id;
    document.getElementById('intent').textContent = data.intent || '—';
    document.getElementById('multi').textContent = data.is_multi_query ? 'yes' : 'no';
    document.getElementById('session').textContent = data.session_id ? data.session_id.slice(0, 8) : '—';
  })
  .catch(function(err) {
    removeLastMessage();
    appendMessage('Error', err.message || 'Unknown error');
  });
}

function appendMessage(sender, text) {
  var box = document.getElementById('messages');
  var p = document.createElement('p');
  var safeText = (text || '').toString().replace(/\n/g, '<br>');
  p.innerHTML = '<b>' + sender + ':</b> ' + safeText;
  box.appendChild(p);
  box.scrollTop = box.scrollHeight;
}

function removeLastMessage() {
  var box = document.getElementById('messages');
  if (box.lastChild) box.removeChild(box.lastChild);
}

function clearChat() {
  if (sessionId) {
    fetch('/session/' + sessionId, { method: 'DELETE' });
  }
  sessionId = null;
  var box = document.getElementById('messages');
  box.innerHTML = '<p><b>agent_a:</b> Hello! I\'m agent_a, your Portal A assistant. How can I help you?</p>';
  document.getElementById('intent').textContent = '—';
  document.getElementById('multi').textContent = '—';
  document.getElementById('session').textContent = '—';
}
</script>

</body>
</html>
