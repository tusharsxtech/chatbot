services:

  # ── Single shared PostgreSQL (chatbot cache + RAG chunks) ─────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatbot-postgres
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Run Alembic migrations before any app starts ──────────────────────────
  migrate:
    build:
      context: .
    container_name: chatbot-migrate
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      PG_DSN: postgresql://chatbot:chatbot@postgres:5432/chatbot
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Kiotel Dashboard RAG API ──────────────────────────────────────────────
  kiotel_rag:
    build:
      context: ./services/kiotel_dashboard_step_guide
    container_name: kiotel-rag-api
    ports:
      - "8001:8000"
    env_file:
      - ./services/kiotel_dashboard_step_guide/.env
    environment:
      PG_DSN: postgresql://chatbot:chatbot@postgres:5432/chatbot
    volumes:
      - ./services/kiotel_dashboard_step_guide/data:/app/data
      - ./services/kiotel_dashboard_step_guide/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Portal A Chatbot ──────────────────────────────────────────────────────
  portal_a:
    build:
      context: .
    container_name: portal-a
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PG_DSN: postgresql://chatbot:chatbot@postgres:5432/chatbot
      KIOTEL_RAG_URL: http://kiotel_rag:8000
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      kiotel_rag:
        condition: service_healthy
    restart: unless-stopped

  # ── RAG ingest ────────────────────────────────────────────────────────────
  ingest:
    build:
      context: ./services/kiotel_dashboard_step_guide
    container_name: kiotel-ingest
    command: python scripts/ingest.py
    env_file:
      - ./services/kiotel_dashboard_step_guide/.env
    environment:
      PG_DSN: postgresql://chatbot:chatbot@postgres:5432/chatbot
    volumes:
      - ./services/kiotel_dashboard_step_guide/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    profiles:
      - ingest

  # ── RAG evaluate ──────────────────────────────────────────────────────────
  evaluate:
    build:
      context: ./services/kiotel_dashboard_step_guide
    container_name: kiotel-evaluate
    command: python scripts/evaluate.py
    env_file:
      - ./services/kiotel_dashboard_step_guide/.env
    environment:
      PG_DSN: postgresql://chatbot:chatbot@postgres:5432/chatbot
    volumes:
      - ./services/kiotel_dashboard_step_guide/data:/app/data
      - ./services/kiotel_dashboard_step_guide/evaluation_results:/app/evaluation_results
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    profiles:
      - evaluate

volumes:
  pgdata:
