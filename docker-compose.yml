services:

  # ── Chatbot postgres ──────────────────────────────────────────────────────
  postgres_chatbot:
    image: pgvector/pgvector:pg16
    container_name: chatbot-postgres
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata_chatbot:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── RAG postgres ──────────────────────────────────────────────────────────
  postgres_rag:
    image: pgvector/pgvector:pg16
    container_name: kiotel-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: kiotel_rag
    ports:
      - "5433:5432"
    volumes:
      - pgdata_rag:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d kiotel_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Kiotel Dashboard RAG API ──────────────────────────────────────────────
  kiotel_rag:
    build:
      context: ./services/kiotel_dashboard_step_guide
    container_name: kiotel-rag-api
    ports:
      - "8001:8000"
    env_file:
      - ./services/kiotel_dashboard_step_guide/.env   # RAG's own .env
    environment:
      # override only the PG_DSN so it points to postgres_rag container
      PG_DSN: postgresql://rag:rag@postgres_rag:5432/kiotel_rag
    volumes:
      - ./services/kiotel_dashboard_step_guide/data:/app/data
      - ./services/kiotel_dashboard_step_guide/logs:/app/logs
    depends_on:
      postgres_rag:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Portal A Chatbot ──────────────────────────────────────────────────────
  portal_a:
    build:
      context: .
    container_name: portal-a
    ports:
      - "8000:8000"
    env_file:
      - .env                                   # chatbot's own .env
    environment:
      # override only what needs docker network values
      PG_DSN: postgresql://chatbot:chatbot@postgres_chatbot:5432/chatbot
      KIOTEL_RAG_URL: http://kiotel_rag:8000
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres_chatbot:
        condition: service_healthy
      kiotel_rag:
        condition: service_healthy
    restart: unless-stopped

  # ── RAG ingest ────────────────────────────────────────────────────────────
  ingest:
    build:
      context: ./services/kiotel_dashboard_step_guide
    container_name: kiotel-ingest
    command: python scripts/ingest.py
    env_file:
      - ./services/kiotel_dashboard_step_guide/.env   # RAG's own .env
    environment:
      PG_DSN: postgresql://rag:rag@postgres_rag:5432/kiotel_rag
    volumes:
      - ./services/kiotel_dashboard_step_guide/data:/app/data
    depends_on:
      postgres_rag:
        condition: service_healthy
    profiles:
      - ingest

  # ── RAG evaluate ──────────────────────────────────────────────────────────
  evaluate:
    build:
      context: ./services/kiotel_dashboard_step_guide
    container_name: kiotel-evaluate
    command: python scripts/evaluate.py
    env_file:
      - ./services/kiotel_dashboard_step_guide/.env   # RAG's own .env
    environment:
      PG_DSN: postgresql://rag:rag@postgres_rag:5432/kiotel_rag
    volumes:
      - ./services/kiotel_dashboard_step_guide/data:/app/data
      - ./services/kiotel_dashboard_step_guide/evaluation_results:/app/evaluation_results
    depends_on:
      postgres_rag:
        condition: service_healthy
    profiles:
      - evaluate

volumes:
  pgdata_chatbot:
  pgdata_rag: